version: 2

models:
  - name: mart_covid19_country_metrics
    description: "Aggregated COVID19 metrics by country and date"
    columns:
      - name: country_code
        description: "ISO country code"
        tests:
          - not_null
      - name: date
        description: "Reporting date"
        tests:
          - not_null
      - name: total_new_cases
        description: "Total new confirmed cases"
        tests:
          - not_null
      - name: case_fatality_rate
        description: "Case fatality rate percentage"
        
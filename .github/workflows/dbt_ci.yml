name: dbt CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
  GCP_PROJECT_ID: covid-data-observability
  BQ_DATASET: healthcare_staging

jobs:
  dbt-test:
    name: Run dbt Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-bigquery==1.9.0

      - name: Create GCP credentials file
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: Create dbt profiles
        run: |
          mkdir -p ${{ github.workspace }}/.dbt
          cat > ${{ github.workspace }}/.dbt/profiles.yml << EOF
          healthcare_dbt:
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ env.GCP_PROJECT_ID }}
                dataset: ${{ env.BQ_DATASET }}
                keyfile: /tmp/gcp-key.json
                location: US
                threads: 4
                job_execution_timeout_